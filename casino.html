<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino 測試大廳</title>
    
    <!-- 效能優化與外部資源 -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://static.line-scdn.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- CSS / Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="casino.css">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@0.575.0/dist/umd/lucide.js" defer></script>
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <!-- 主程式 -->
    <script src="casino.js" defer></script>
</head>
<body class="bg-[#0D131A] min-h-screen text-white font-['Outfit'] pb-safe overflow-x-hidden">

    <!-- 背景圖層 -->
    <div class="fixed inset-0 pointer-events-none z-0 bg-cover bg-center opacity-40" style="background-image: url('images/wood-bg.jpg');"></div>
    <div class="fixed inset-0 bg-[radial-gradient(ellipse_at_center,rgba(13,19,26,0.3)_0%,rgba(13,19,26,0.9)_100%)] pointer-events-none z-0"></div>

    <div class="relative z-10 flex flex-col h-screen">
        
        <!-- Header -->
        <header class="flex justify-between items-center p-4 border-b border-[#D4AF37]/30 bg-[#0D131A]/80 backdrop-blur-md">
            <button onclick="window.location.href='index.html'" class="p-2 rounded-full hover:bg-white/10 transition active:scale-90">
                <i data-lucide="chevron-left" class="w-6 h-6 text-[#D4AF37]"></i>
            </button>
            <h1 class="text-xl font-black tracking-widest text-[#D4AF37] drop-shadow-md">CASINO LOBBY</h1>
            <div class="flex items-center gap-2 bg-[#1E3052]/50 border border-[#D4AF37]/50 px-3 py-1.5 rounded-full shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                <i data-lucide="coins" class="w-4 h-4 text-[#F3E5AB]"></i>
                <span id="player-wallet" class="font-mono font-bold text-[#F3E5AB]">---</span>
            </div>
        </header>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#0D131A]/90 backdrop-blur-sm transition-opacity duration-300">
            <div class="w-12 h-12 border-4 border-[#D4AF37] border-t-transparent rounded-full animate-spin mb-4"></div>
            <div class="text-[#D4AF37] font-bold tracking-widest animate-pulse">載入中...</div>
        </div>

        <!-- 主內容區塊 (動態切換) -->
        <main id="main-content" class="flex-1 overflow-y-auto hidden-scrollbar relative p-4">
            
            <!-- 大廳選單視圖 -->
            <div id="view-lobby" class="space-y-6 max-w-md mx-auto mt-4 animate-fade-in">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-white mb-2">選擇遊戲</h2>
                    <p class="text-sm text-gray-400">所有遊戲共用積分錢包</p>
                </div>
                
                <!-- 遊戲入口：小瑪莉 -->
                <button onclick="CasinoApp.openGame('mary')" class="w-full relative overflow-hidden rounded-2xl group border border-[#D4AF37]/30 hover:border-[#D4AF37] transition-all active:scale-95 shadow-[0_4px_20px_rgba(0,0,0,0.5)] bg-gradient-to-br from-[#1E3052] to-[#0D131A]">
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=600&auto=format&fit=crop')] opacity-20 mix-blend-overlay group-hover:opacity-40 transition-opacity bg-cover bg-center"></div>
                    <div class="p-6 flex items-center justify-between relative z-10">
                        <div class="text-left">
                            <h3 class="text-2xl font-black text-[#F3E5AB] drop-shadow-md mb-1">小瑪莉</h3>
                            <p class="text-xs text-gray-300">正宗台式懷舊水果盤</p>
                        </div>
                        <div class="w-12 h-12 rounded-full bg-[#D4AF37]/20 flex items-center justify-center backdrop-blur-md">
                            <i data-lucide="gamepad-2" class="w-6 h-6 text-[#D4AF37]"></i>
                        </div>
                    </div>
                </button>

                <!-- 遊戲入口：經典輪盤 -->
                <button onclick="CasinoApp.openGame('roulette')" class="w-full relative overflow-hidden rounded-2xl group border border-emerald-500/30 hover:border-emerald-400 transition-all active:scale-95 shadow-[0_4px_20px_rgba(0,0,0,0.5)] bg-gradient-to-br from-emerald-900 to-[#0D131A]">
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1606167668511-88c227eb0dc6?q=80&w=600&auto=format&fit=crop')] opacity-20 mix-blend-overlay group-hover:opacity-40 transition-opacity bg-cover bg-center"></div>
                    <div class="p-6 flex items-center justify-between relative z-10">
                        <div class="text-left">
                            <h3 class="text-2xl font-black text-emerald-400 drop-shadow-md mb-1">經典輪盤</h3>
                            <p class="text-xs text-gray-300">Roulette 歐式單零盤</p>
                        </div>
                        <div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center backdrop-blur-md">
                            <i data-lucide="circle-dashed" class="w-6 h-6 text-emerald-400"></i>
                        </div>
                    </div>
                </button>

                <!-- 遊戲入口：骰寶 -->
                <button onclick="CasinoApp.openGame('sicbo')" class="w-full relative overflow-hidden rounded-2xl group border border-red-500/30 hover:border-red-500 transition-all active:scale-95 shadow-[0_4px_20px_rgba(0,0,0,0.5)] bg-gradient-to-br from-red-950 to-[#0D131A]">
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1570303345338-e1f0eddf4946?q=80&w=600&auto=format&fit=crop')] opacity-30 mix-blend-overlay group-hover:opacity-50 transition-opacity bg-cover bg-center"></div>
                    <div class="p-6 flex items-center justify-between relative z-10">
                        <div class="text-left">
                            <h3 class="text-2xl font-black text-red-400 drop-shadow-md mb-1">骰寶</h3>
                            <p class="text-xs text-gray-300">Sic Bo 賭大小</p>
                        </div>
                        <div class="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center backdrop-blur-md">
                            <i data-lucide="dice-5" class="w-6 h-6 text-red-400"></i>
                        </div>
                    </div>
                </button>
            </div>

            <!-- 小瑪莉視圖 (Mary View) -->
            <div id="view-mary" class="hidden space-y-4 max-w-md mx-auto flex-col animate-fade-in pb-40">
                <div class="flex justify-between items-center bg-[#1E3052]/60 p-3 rounded-xl border border-white/10 backdrop-blur-md">
                    <button onclick="CasinoApp.backToLobby()" class="text-gray-400 hover:text-white flex items-center gap-1 text-sm font-bold"><i data-lucide="arrow-left" class="w-4 h-4"></i> 返回大廳</button>
                    <div class="text-xs text-gray-400">小瑪莉 (移植版)</div>
                </div>
                <!-- 預留給 app.js 原本小瑪莉 HTML 的重製版放置處 -->
                <div class="flex-1 flex items-center justify-center border-2 border-dashed border-gray-600 rounded-xl text-gray-500 font-bold p-8 text-center bg-black/20">
                    <div>
                        <i data-lucide="hammer" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                        開發中... 將從主程式移植
                    </div>
                </div>
            </div>

            <!-- 輪盤視圖 (Roulette View) -->
            <div id="view-roulette" class="hidden space-y-4 max-w-md mx-auto flex-col animate-fade-in pb-40">
                <div class="flex justify-between items-center bg-emerald-900/60 p-3 rounded-xl border border-emerald-500/20 backdrop-blur-md">
                    <button onclick="CasinoApp.backToLobby()" class="text-gray-400 hover:text-white flex items-center gap-1 text-sm font-bold"><i data-lucide="arrow-left" class="w-4 h-4"></i> 返回大廳</button>
                    <div class="text-xs text-emerald-400 font-bold">Roulette</div>
                </div>
                <div id="roulette-container" class="flex-1 flex flex-col justify-between">
                     <!-- 輪盤動畫區 -->
                     <div class="relative w-full aspect-square max-w-[280px] mx-auto mb-4 bg-gradient-to-br from-gray-900 to-black rounded-full border-[12px] border-[#8B5A2B] shadow-[0_0_30px_rgba(0,0,0,0.8)] flex items-center justify-center">
                         <div id="roulette-wheel" class="w-[90%] h-[90%] rounded-full relative transition-transform duration-[5000ms] ease-[cubic-bezier(0.1,0.9,0.2,1)]" style="transform: rotate(0deg);"></div>
                         <!-- 綠色數字中心指示 -->
                         <div class="absolute w-8 h-8 bg-emerald-600 rounded-full border-2 border-white/50 z-20 flex items-center justify-center shadow-lg"><div class="w-3 h-3 bg-[#D4AF37] rounded-full"></div></div>
                         <!-- 球 -->
                         <div id="roulette-ball-track" class="absolute w-[80%] h-[80%] rounded-full border border-white/10 z-10 pointer-events-none transition-transform duration-[5000ms] ease-[cubic-bezier(0.1,0.9,0.2,1)]" style="transform: rotate(0deg);">
                             <div id="roulette-ball" class="absolute top-[-5px] left-1/2 -ml-1 w-3 h-3 bg-white rounded-full shadow-[0_0_5px_rgba(255,255,255,0.8)]"></div>
                         </div>
                     </div>
                     
                     <!-- 押注桌面區 -->
                     <div class="relative w-full bg-emerald-800 rounded-xl p-2 border-2 border-emerald-950 shadow-inner">
                         <div class="text-center text-emerald-400/50 text-xs mb-1 font-bold tracking-widest">BETTING BOARD</div>
                         <div id="roulette-board" class="grid grid-cols-[auto_1fr] gap-1 select-none">
                             <!-- 動態由 JS 生成 -->
                         </div>
                     </div>
                </div>
            </div>

            <!-- 骰寶視圖 (Sic Bo View) -->
            <div id="view-sicbo" class="hidden space-y-4 max-w-md mx-auto flex-col animate-fade-in pb-40">
                <div class="flex justify-between items-center bg-red-950/60 p-3 rounded-xl border border-red-500/20 backdrop-blur-md">
                    <button onclick="CasinoApp.backToLobby()" class="text-gray-400 hover:text-white flex items-center gap-1 text-sm font-bold"><i data-lucide="arrow-left" class="w-4 h-4"></i> 返回大廳</button>
                    <div class="text-xs text-red-400 font-bold">Sic Bo</div>
                </div>
                <!-- 骰寶視窗內容 -->
                <div class="flex-1 flex flex-col">
                    <!-- 骰子容器 -->
                    <div class="flex justify-center items-center gap-4 py-6 bg-red-950/40 rounded-xl mb-4 border border-red-900/50 shadow-inner">
                        <div id="dice-1" class="w-14 h-14 bg-white rounded-xl shadow-lg border border-gray-300 flex items-center justify-center text-red-600 font-black text-3xl transition-transform duration-100">1</div>
                        <div id="dice-2" class="w-14 h-14 bg-white rounded-xl shadow-lg border border-gray-300 flex items-center justify-center text-red-600 font-black text-3xl transition-transform duration-100">2</div>
                        <div id="dice-3" class="w-14 h-14 bg-white rounded-xl shadow-lg border border-gray-300 flex items-center justify-center text-red-600 font-black text-3xl transition-transform duration-100">3</div>
                    </div>
                    
                    <!-- 骰寶桌布 -->
                    <div class="relative w-full bg-[#8b0000] rounded-xl p-2 border-2 border-red-950 shadow-inner">
                        <div class="text-center text-red-400/80 text-xs mb-1 font-bold tracking-widest">BETTING BOARD</div>
                        <div id="sicbo-board" class="flex flex-col gap-1 select-none">
                            <!-- 動態由 JS 生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 共用底部籌碼列 (只在遊戲中顯示) -->
        <div id="casino-footer" class="fixed bottom-0 left-0 w-full bg-[#0D131A]/95 backdrop-blur-lg border-t border-white/10 p-3 pb-safe-bottom transform translate-y-full transition-transform duration-300 z-40">
            <div class="max-w-md mx-auto">
                <div class="flex justify-between items-end mb-2 px-1">
                    <div class="text-xs text-gray-400 font-bold">選擇籌碼</div>
                    <div class="flex gap-2">
                        <button onclick="CasinoApp.handleClear()" class="text-xs px-3 py-1.5 rounded bg-gray-800 text-gray-300 hover:bg-gray-700 active:scale-95 transition border border-gray-600">清除</button>
                        <button onclick="CasinoApp.handleSpin()" class="text-xs px-4 py-1.5 rounded bg-gradient-to-r from-[#D4AF37] to-[#A67C00] text-black font-bold hover:brightness-110 active:scale-95 transition shadow-lg">SPIN</button>
                    </div>
                </div>
                <div class="flex justify-between gap-1 overflow-x-auto hide-scrollbar py-1">
                    <!-- Chips: 1, 5, 10, 20, 25, 50 -->
                    <button onclick="CasinoApp.selectChip(1)" class="chip-btn" data-value="1"><div class="chip-inner border-gray-400 text-gray-200">1</div></button>
                    <button onclick="CasinoApp.selectChip(5)" class="chip-btn" data-value="5"><div class="chip-inner border-red-500 text-red-100">5</div></button>
                    <button onclick="CasinoApp.selectChip(10)" class="chip-btn" data-value="10"><div class="chip-inner border-blue-500 text-blue-100">10</div></button>
                    <button onclick="CasinoApp.selectChip(20)" class="chip-btn" data-value="20"><div class="chip-inner border-green-500 text-green-100">20</div></button>
                    <button onclick="CasinoApp.selectChip(25)" class="chip-btn" data-value="25"><div class="chip-inner border-purple-500 text-purple-100">25</div></button>
                    <button onclick="CasinoApp.selectChip(50)" class="chip-btn" data-value="50"><div class="chip-inner border-yellow-500 text-yellow-100">50</div></button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>

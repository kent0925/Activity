<body class="bg-[#0D131A] min-h-screen pb-safe relative">

    <!-- 🌟 頂級實木背景 (Premium Wood Background) -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute inset-0 w-full h-full" style="background: url('images/wood-bg.jpg') repeat; background-size: cover; opacity: 0.95;"></div>
        <!-- 保留邊緣暗角，增加螢幕邊框的層次與聚焦感 -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(0,0,0,0)_0%,rgba(0,0,0,0.6)_100%)]"></div>
    </div>
    
    <!-- 確保主要內容層級在光暈之上 -->
    <div class="relative z-10">
    <!-- 初始載入畫面 (Loading Overlay) -->
    <div id="initial-load-overlay"
        onclick="if(window.hideInitialOverlay && !_slotSpinning) window.hideInitialOverlay();"
        class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-500 cursor-pointer"
        style="background: url('images/wood-bg.jpg') repeat; background-size: cover;">
        
        <!-- 質感暗角遮罩，讓文字與拉霸機更清晰 -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(0,0,0,0.4)_0%,rgba(0,0,0,0.85)_100%)] pointer-events-none z-0"></div>

        <div class="text-[#F3E5AB] text-3xl font-bold mb-4 animate-bounce pointer-events-none relative z-10" style="text-shadow: 0 4px 6px rgba(0,0,0,0.8);">🍺 大老二兄弟會</div>
        <!-- 迷你老虎機 -->
        
        </div>
    </div>

    <header
        class="text-white px-4 py-3 shadow-xl sticky top-0 z-50 flex justify-between items-center h-14 lg:h-16"
        style="background: url('images/leather-bg.jpg') repeat; border-bottom: 2px solid rgba(212, 175, 55, 0.5); box-shadow: 0 4px 15px rgba(0,0,0,0.8);">
        <div class="flex items-center gap-3">
            <button id="btn-back" onclick="handleBackNav()"
                class="hidden p-1.5 hover:bg-white/20 rounded-full transition active:scale-90">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <h1 class="text-lg font-bold tracking-wide" id="header-title">活動與報名</h1>
        </div>
        <!-- 右上角快速分享按鈕 -->
        <button id="btn-header-share" onclick="openShareModal()"
            class="hidden p-2 hover:bg-white/20 rounded-full transition active:scale-90" title="分享活動資訊">
            <i data-lucide="share-2" class="w-5 h-5"></i>
        </button>
    </header>

    <div class="max-w-md mx-auto p-4 pb-24 relative min-h-[calc(100vh-64px)]">

        <div id="view-home" class="view-section space-y-2 animate-fade-in">
            <!-- Premium 排行榜核心區塊 -->
            <div id="home-rankings-section" class="premium-dark-card p-4 pb-2 animate-fade-in relative overflow-hidden">
                <!-- 裝飾螺絲釘 -->
                <div class="rivet tl"></div><div class="rivet tr"></div>
                <div class="rivet bl"></div><div class="rivet br"></div>
                
                <!-- 背景微光裝飾 -->
                <div class="absolute top-0 left-0 w-32 h-32 bg-amber-500/10 rounded-full -ml-16 -mt-16 blur-3xl"></div>
                <div class="absolute bottom-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mb-16 blur-3xl"></div>

                <div class="grid grid-cols-2 gap-4 divide-x divide-white/10 relative z-10">
                    <!-- 左側：出席王 -->
                    <div id="participation-stats-container" onclick="openRankingsModal('attendance', event)"
                        class="cursor-pointer active:opacity-70 transition-opacity">
                        <div class="flex items-center gap-1.5 mb-1 px-1">
                            <div class="w-7 h-7 bg-amber-500/20 rounded-lg flex items-center justify-center">
                                <i data-lucide="award" class="w-4 h-4 text-amber-400"></i>
                            </div>
                            <span class="text-xs font-black text-amber-50/90 tracking-wider">出席王排行</span>
                        </div>
                        <div id="participation-top3-list" class="flex justify-around items-end h-[90px]">
                            <div class="text-xs text-amber-200/30 animate-pulse">載入中...</div>
                        </div>
                    </div>
                    <!-- 右側：拉霸英雄 -->
                    <div id="home-jackpot-container" onclick="openRankingsModal('jackpot', event)"
                        class="cursor-pointer active:opacity-70 transition-opacity">
                        <div class="flex items-center gap-1.5 mb-1 px-2">
                            <div class="w-7 h-7 bg-white/10 rounded-lg flex items-center justify-center">
                                <i data-lucide="crown" class="w-4 h-4 text-white"></i>
                            </div>
                            <span class="text-xs font-black text-white/90 tracking-wider">瑪莉英雄榜</span>
                        </div>
                        <div id="home-jackpot-list" class="flex justify-around items-end h-[90px]">
                            <div class="text-xs text-white/30 animate-pulse">載入中...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 歷史活動與小瑪莉 (並列) -->
            <div class="flex justify-center gap-3 px-1">
                <button onclick="toggleHistoryView()" id="btn-history-toggle"
                    class="flex-1 max-w-[180px] bg-white/10 backdrop-blur-md text-white/70 px-4 py-2.5 rounded-2xl flex items-center justify-center gap-2 hover:bg-white/20 transition-all font-bold text-xs border border-white/20 shadow-sm">
                    <i data-lucide="history" class="w-4 h-4"></i>
                    <span id="history-btn-text">回顧過往</span>
                </button>
                <button onclick="window.location.href='casino.html'" id="btn-casino-open"
                    class="flex-1 max-w-[180px] bg-gradient-to-br from-[#2A1B08] to-[#140D04] text-[#F3E5AB] px-4 py-2.5 rounded-2xl flex items-center justify-center gap-2 hover:brightness-110 transition-all font-black text-xs shadow-[0_0_15px_rgba(212,175,55,0.4)] border border-[#D4AF37] relative overflow-hidden group active:scale-95">
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-[#D4AF37]/30 to-transparent translate-x-[-100%] animate-[shimmer_2.5s_infinite]"></div>
                    <i data-lucide="crown" class="w-4 h-4 text-[#D4AF37] relative z-10 drop-shadow-[0_0_5px_rgba(212,175,55,0.8)]"></i>
                    <span class="relative z-10 tracking-wider text-shadow-sm">Casino 大廳</span>
        </div>

    </div>
    <!-- 報名操作教學彈窗 -->
    <div id="tutorial-modal"
        class="hidden fixed inset-0 z-[130] flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-md p-0 sm:p-4">
        <div class="premium-card rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-md max-h-[85dvh] sm:max-h-[85vh] flex flex-col relative transform translate-y-full sm:translate-y-10 opacity-0 transition-all duration-300"
            id="tutorial-modal-content">
            <!-- 標頭 -->
            <div class="p-4 border-b border-[#D4AF37]/20 flex justify-between items-center bg-[#162544]/80 rounded-t-2xl backdrop-blur-md sticky top-0 z-10">
                <h3 class="font-bold text-[#EFECE5] flex items-center gap-2">
                    <i data-lucide="help-circle" class="w-5 h-5 text-[#D4AF37]"></i> 報名操作教學
                </h3>
                <button onclick="closeTutorialModal()"
                    class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition text-white/60">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- 內容區 -->
            <div class="p-5 overflow-y-auto flex-1 min-h-0 overscroll-contain pb-safe space-y-5 bg-[#0D131A]/60">
                <!-- 報名操作教學圖片 -->
                <div class="rounded-2xl overflow-hidden border border-[#D4AF37]/20 shadow-md bg-[#162544]/50 p-1">
                    <img src="./registration_tutorial.jpg" alt="報名教學圖解" class="w-full h-auto object-contain rounded-xl opacity-90">
                </div>
                
                <!-- 提示 Banner -->
                <div class="bg-[#B8922A]/10 border border-[#B8922A]/30 rounded-2xl p-4 flex gap-3 text-xs text-[#EFECE5]">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-[#D4AF37] shrink-0 mt-0.5"></i>
                    <div class="space-y-1 leading-relaxed">
                        <strong class="block font-bold text-[#D4AF37]">💡 填寫提示：</strong>
                        若漏填 <span class="text-[#FF6B6B] font-bold">*必選</span> 欄位（例如：<strong>上車地點</strong>或<strong>房型需求</strong>），點擊確認時網頁會自動捲動至該欄位，並以 <span class="text-[#FF6B6B] font-bold">紅色外框高亮顯示</span> 提示您補選。
                    </div>
                </div>
            </div>

            <!-- 底部關閉按鈕 -->
            <div class="p-4 border-t border-[#D4AF37]/20 bg-[#162544]/80 flex gap-2 rounded-b-2xl">
                <button onclick="closeTutorialModal()"
                    class="w-full py-3 bg-gradient-to-r from-[#D4AF37] to-[#A67C00] hover:brightness-110 text-[#0D131A] font-bold rounded-xl shadow-[0_4px_15px_rgba(212,175,55,0.4)] transition active:scale-95 text-center text-sm">
                    我懂了，開始報名！
                </button>
            </div>
        </div>
    </div>

    <script>
        window.canvasToFile = function(canvas, filename) {
            return new Promise(resolve => {
                canvas.toBlob(blob => {
                    resolve(new File([blob], filename, { type: 'image/png' }));
                }, 'image/png');
            });
        };
    </script>
    <script src="app.js?v=1781623164010"></script>
</body>

</html>
